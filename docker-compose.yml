version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: automatch_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - automatch_net

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: automatch_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/automatch
      - JWT_SECRET=supersecretaccesskey12345!
      - JWT_REFRESH_SECRET=supersecretrefreshkey54321!
      - CLIENT_URL=https://cardekho-assignment-client.vercel.app
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - automatch_net

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: automatch_client
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${SERVER_URL}/api/v1
      - VITE_APP_NAME=AutoMatch AI
    depends_on:
      - server
    networks:
      - automatch_net

volumes:
  mongo_data:

networks:
  automatch_net:
    driver: bridge
