name: CI/CD Monorepo Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Check Workspace Lints
        run: npm run lint --if-present

      - name: Audit Dependencies for Security Vulnerabilities
        run: npm audit --audit-level=high || true

  build-and-compile:
    runs-on: ubuntu-latest
    needs: audit-and-lint
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: TypeScript Build Check
        run: npm run build

  backend-integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-compile
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Run Backend Integration Test Suite
        env:
          MONGODB_URI: mongodb://localhost:27017/automatch_test
          JWT_SECRET: supersecretaccesskey12345!
          JWT_REFRESH_SECRET: supersecretrefreshkey54321!
          NODE_ENV: test
        run: npm run test --workspace=apps/server
